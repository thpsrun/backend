volumes:
  postgres_data:
    name: thpsrun_prod_postgres_data
  static_files:
    name: thpsrun_static_files

services:
  postgres:
    container_name: postgres
    image: postgres:17.10-bookworm
    restart: unless-stopped
    shm_size: 128mb
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - thpsrun

  django:
    container_name: django
    restart: unless-stopped
    build: .
    ports:
      - "8001:8001"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - static_files:/app/static:rw
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    networks:
      - thpsrun
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  celery:
    container_name: celery
    restart: unless-stopped
    build: .
    command: celery -A website worker --loglevel=info -E --max-tasks-per-child=100
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    networks:
      - thpsrun

  celery-beat:
    container_name: celery-beat
    restart: unless-stopped
    build: .
    command: celery -A website beat --loglevel=info
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    networks:
      - thpsrun

  redis:
    container_name: redis
    image: redis:8.6.3-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    security_opt:
      - no-new-privileges:true
    networks:
      - thpsrun

networks:
  thpsrun:
    driver: bridge
    external: true
