volumes:
  postgres_data:
    name: thpsrun_postgres_data
  static_files:
    name: thpsrun_static_files
  media_files:
    name: thpsrun_media_files

services:
  postgres:
    container_name: postgres
    image: postgres:17.10-bookworm
    restart: unless-stopped
    shm_size: 128mb
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - thpsrun

  django:
    container_name: django
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: 1000
        GID: 1000
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8001"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app:z
      - static_files:/app/static
      - media_files:/app/media
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    networks:
      - thpsrun
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/api/v1/health').status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  celery:
    container_name: celery
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: 1000
        GID: 1000
    restart: unless-stopped
    command: celery -A website worker --loglevel=info -E --max-tasks-per-child=100
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app:z
      - media_files:/app/media
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    networks:
      - thpsrun

  celery-beat:
    container_name: celery-beat
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: 1000
        GID: 1000
    restart: unless-stopped
    command: celery -A website beat --loglevel=info -s /tmp/celerybeat-schedule
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app:z
      - media_files:/app/media
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    networks:
      - thpsrun

  redis:
    container_name: redis
    image: redis:8.6.3-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    security_opt:
      - no-new-privileges:true
    networks:
      - thpsrun

networks:
  thpsrun:
    driver: bridge
