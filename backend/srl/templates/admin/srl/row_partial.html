{% load i18n %}
<li
    class="adm-row"
    data-id="{{ target_id }}"
    data-name="{{ item.name|lower }}"
    {% if item.order == 0 %}data-unordered="1"{% endif %}
>
    <span class="adm-grip" aria-hidden="true">&#x2630;</span>
    <span class="adm-name">
        {{ item.name }}
        {% if item.order == 0 %}<span class="adm-meta adm-unordered-tag">(unordered)</span>{% endif %}
    </span>
    <span class="adm-meta adm-order">order: {{ item.order }}</span>
    <div class="adm-arrows">
        <button
            type="button"
            class="adm-arrow"
            aria-label="Move up"
            data-direction="up"
        >&#8593;</button>
        <button
            type="button"
            class="adm-arrow"
            aria-label="Move down"
            data-direction="down"
        >&#8595;</button>
    </div>
    {% if target_type != "level" %}
    <input
        type="checkbox"
        class="adm-checkbox"
        {% if vis_url %}
        hx-post="{{ vis_url }}"
        hx-trigger="change delay:500ms"
        hx-vals='{"target_type": "{{ target_type }}", "target_id": "{{ target_id }}"}'
        hx-swap="none"
        {% endif %}
        name="value"
        value="true"
        {% if item.appear_on_main %}checked{% endif %}
    >
    {% endif %}
</li>
