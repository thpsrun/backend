{% extends "admin/base_site.html" %}
{% load i18n static %}

{% block extrahead %}
{{ block.super }}
<link rel="stylesheet" href="{% static 'admin/css/admin_custom.css' %}">
<script src="{% static 'admin/vendor/htmx.min.js' %}" defer></script>
<script src="{% static 'admin/vendor/sortable.min.js' %}" defer></script>
<script src="{% static 'admin/js/admin_custom.js' %}" defer></script>
{% endblock %}

{% block content %}
{% if messages %}
<ul class="messagelist">
    {% for message in messages %}
    <li class="{{ message.tags }}">{{ message }}</li>
    {% endfor %}
</ul>
{% endif %}

{% block admin_custom_body %}{% endblock %}
{% endblock %}
